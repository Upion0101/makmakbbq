<section class="menu-hero">
  <div class="container">
    <div class="hero-copy">
      <div class="eyebrow">Mak-Mak BBQ Menu</div>

      <h1 class="headline">Our Menu</h1>

      <p class="subhead">
        Take a look at our menu below, then call to order or order on DoorDash.
      </p>

      <div class="hero-actions">
        <a class="btn primary" [href]="phoneHref">Call to Order</a>
        <a class="btn secondary" [href]="doordashUrl" target="_blank" rel="noopener">
          Order on DoorDash
        </a>
      </div>
    </div>
  </div>
</section>

<section class="menu-content">
  <div class="container">
    <div class="section-card menu-image-card">
      <div class="menu-image-wrap">
        <img
          src="/assets/menu/menu.png"
          alt="Mak-Mak BBQ full menu"
          class="menu-image"
        />
      </div>
    </div>
  </div>
</section>
